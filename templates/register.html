{% extends 'base.html' %}
{% block title %}S'inscrire · DataWave Analytics{% endblock %}
{% block pub_content %}
<div class="login-page">
  <div style="width:100%;max-width:440px;background:var(--s1);border:1px solid var(--brd2);border-radius:16px;padding:2.5rem;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;margin:0 auto .75rem">
        <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:900;margin-bottom:.3rem">Créer un compte</h1>
      <p style="color:var(--t2);font-size:.84rem">Accès Viewer à DataWave Analytics</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.85rem">
        <div class="field"><label>Prénom *</label><input type="text" name="first_name" placeholder="Prénom" required></div>
        <div class="field"><label>Nom *</label><input type="text" name="last_name" placeholder="Nom" required></div>
      </div>
      <div class="field"><label>Identifiant *</label><input type="text" name="username" placeholder="Nom d'utilisateur" required></div>
      <div class="field"><label>Email *</label><input type="email" name="email" placeholder="votre@email.com" required></div>
      <div class="field"><label>Mot de passe * (min. 8 car.)</label><input type="password" name="password" placeholder="••••••••" required minlength="8"></div>
      <div class="field"><label>Confirmer *</label><input type="password" name="password2" placeholder="Répéter" required></div>
      <button type="submit" class="btn-submit" style="margin-top:.5rem">Créer mon compte →</button>
    </form>
    <div style="text-align:center;margin-top:.85rem;font-size:.78rem;color:var(--t3)">
      Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a> &nbsp;·&nbsp; <a href="{{ url_for('home') }}">← Accueil</a>
    </div>
  </div>
</div>
{% endblock %}
